<!DOCTYPE html>
<html>
<head>
    <title>Sleepy Puppy</title>
    <link rel="stylesheet" href="../css/sleepy.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>
<body>

    <div class="stars">
    <i class="fa-solid fa-star"></i>
    <i class="fa-solid fa-star"></i>
    <i class="fa-solid fa-star"></i>

    <i class="fa-solid fa-moon"></i>

    <i class="fa-solid fa-star"></i>
    <i class="fa-solid fa-star"></i>
    <i class="fa-solid fa-star"></i>
</div>

    <h1 id="sleepText">😴 Sleeping...</h1>

    <img id="dogImage" src="./pup_sleepy.jpg" alt="Sleeping Dog" height="300px" width="500%">

    <h2 class="zzz"><i class="fa-solid fa-cloud-moon"></i> ZZZ 💨<i class="fa-solid fa-star"></i></h2>

    <h3 id="msg"></h3>

    <h3 id="timer">Wake up in 10 seconds</h3>

    <h3 id="energy">
        Energy Restored: █░░░░░░░░░ 10%
    </h3>

    <audio autoplay loop src="./luaabbyy.mp3"></audio>

    <script src="../js/sleepy.js"></script>
       <script src="../js/pet_activties.js"></script>
</body>
</html>
